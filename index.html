<!DOCTYPE html>
<html>
<head>
<title>ORVANTA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#151515);
}

.logo{
font-size:70px;
font-weight:bold;
color:#ff6b00;
}

.tagline{
font-size:22px;
margin-top:10px;
color:#ccc;
}

.button{
margin-top:40px;
padding:15px 40px;
background:#ff6b00;
color:white;
text-decoration:none;
border-radius:10px;
font-size:20px;
}

.stats{
display:flex;
gap:30px;
margin-top:50px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
width:200px;
text-align:center;
box-shadow:0 0 20px rgba(255,107,0,.3);
}

</style>

</head>

<body>

<section class="hero">

<div class="logo">
ORVANTA
</div>

<div class="tagline">
AI Powered Options Trading Platform
</div>

<a href="#" class="button">
Launch Dashboard
</a>

<div class="stats">

<div class="card">
<h2>82%</h2>
Win Rate
</div>

<div class="card">
<h2>2.37</h2>
Profit Factor
</div>

<div class="card">
<h2>₹12.5L</h2>
Managed Capital
</div>

</div>

</section>

</body>
</html>
